name: Conventional Commits

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  check-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: |
          python -m pip install --only-binary ':all:' commitizen==4.8.3

      - name: Validate commit messages (push)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            cz check --rev-range HEAD~20..HEAD
          else
            cz check --rev-range "$before..${{ github.sha }}"
          fi

      - name: Validate commit messages (pull request)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
